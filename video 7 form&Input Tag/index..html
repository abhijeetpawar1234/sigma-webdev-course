<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms Lets learn it</title>
</head>

<body>
    <h1>Form to apply for sigma web dev course TA</h1>
    <form action="post">
        <div>
            <label for="username">enter your username</label>
            <input type="text" id="username" name="username" placeholder="enter user name here" autofocus>
        </div>
        <div>
            <input type="radio" name="gender" id="female" value="Female">
            <label for="female">Female</label>
            <input type="radio" name="gender" id="male" value="male">
            <label for="male">Male</label>
        </div>
        <div>
            <input type="checkbox" name="subcribe" id="subcribe" value="yes">
            <label for="subcribe">Subcribe to newsletter</label>
        </div>
        <div>
            <label for="textarea1">Enter your comment..</label>
            <br>
            <textarea name="textarea1" id="textarea1" rows="23" cols="30" value>
            </textarea>
        </div>
        <div>
            <select name="fruits">
                <option value="apple">Apple</option>
                <option value="banana">Banana</option>
                <option value="cherry">Cherry</option>
            </select>
        </div>
    </form>

</body>

</html>
