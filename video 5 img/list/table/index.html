<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img height="230" src="demoimg.jpg" alt="train image">
    <br>
    <table>
        <caption>Employee Details</caption>

        <thead>
            <tr>
                <th>Name</th>
                <th>Designation</th>
                <th>Fav Language</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Harry</td>
                <td>Programmer</td>
                <td>Javascript</td>
            </tr>

            <tr>
                <td colspan="2">Sam</td>
                <td rowspan="2">Java</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="2">Sam</td>
                <td>foot</td>
            </tr>
        </tfoot>

    </table>

    <ul type="circle" > 
        <li>Shubham</li>
        <li>Rohan</li>
        <li>harry</li>
    </ul>
    <ol type="i">
        <li>red</li>
        <li>blue</li>
        <li>green</li>
    </ol>

</body>

</html>
