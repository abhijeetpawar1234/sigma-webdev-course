<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quize 1 on form</title>
</head>
<body>
    <form action="post">
        <h3>Details Form</h3>
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" name="uname" placeholder="Enter Name Here" autofocus>
            <div>
                <label for="city">Choose city:</label>
                <select name="city" id="ciyt">
                <option value="Pune">Pune</option>
                <option value="Mumbai">Mumbai</option>
                <option value="Delhi">Delhi</option>
                <option value="Hydrabad">Hydrabad</option>
            </select>
            </div>
            <div>
                <label for="pincode">Pincode:</label>
                <textarea name="pincode" id="pincode" rows="1" cols="20"> 
                </textarea>
            </div>
            
        </div>
    </form>
</body>
</html>
